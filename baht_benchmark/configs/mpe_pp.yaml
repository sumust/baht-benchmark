# MPE Predator-Prey BAHT benchmark config
env: mpe
env_args:
  key: "mpe:SimplePredPreyHeuristic-v0"
  time_limit: 25

n_agents: 4
n_actions: 5
episode_limit: 25

runner: "byzantine"
mac: "open_train_mac"

batch_size_run: 4
batch_size: 32
buffer_size: 32
t_max: 250000

byzantine_budget: 1
byzantine_type: "random"

hidden_dim: 64
use_cuda: True
use_tensorboard: True

# DR noise calibration
obs_noise_std: 0.05
action_noise_eps: 0.10
